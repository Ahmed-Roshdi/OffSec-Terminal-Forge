name: 🧠 Workflow-Output (AI Generator)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

env:
  CI: true
  MAPS_PER_RUN: "1"
  SCENARIOS_PER_RUN: "1"

jobs:
  generate-and-merge:
    name: 🚀 Generate Cyberpunk Assets → Push → Merge to Main
    runs-on: ubuntu-latest
    environment: Dialogue_Generator-AI
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔤 Install terminal fonts (Ubuntu Mono)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-ubuntu fonts-dejavu-core

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Verify secrets are present
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          MISSING=0
          [ -z "$GROQ_API_KEY" ] && echo "[!] GROQ_API_KEY is missing (fallback scripts will be used)." && MISSING=0
          [ -z "$GH_PAT"       ] && echo "[!] GH_PAT is missing." && MISSING=1
          [ "$MISSING" -eq 1 ] && exit 1
          echo "[+] GH_PAT loaded from Dialogue_Generator-AI environment."

      - name: ⚙️ Run generation pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_REQUEST: "Generate a cyberpunk OffSec dialogue between two AI units (7-10 lines)."
        run: python engines/orchestrator.py

      - name: 🔍 Verify output files were created
        run: |
          echo "[*] Files found in output/:"
          find output/ -type f ! -name '.gitkeep' | head -30
          COUNT=$(find output/ -type f ! -name '.gitkeep' | wc -l)
          echo "[*] Total: $COUNT files"
          if [ "$COUNT" -eq 0 ]; then
            echo "[!] output/ is empty — nothing to commit. Aborting."
            exit 1
          fi
          test -n "$(find output/maps -name '*.webp' -print -quit)" || { echo "[!] No map WebP produced."; exit 1; }
          test -n "$(find output/dialogues -name 'ai_dialogue_raw_*.json' -print -quit)" || { echo "[!] No dialogue JSON produced."; exit 1; }
          test -n "$(find output/dialogues -name 'dialogue_seq_*.webp' -print -quit)" || { echo "[!] No dialogue WebP produced."; exit 1; }

      - name: 📤 Commit & push to auto/generate-assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B auto/generate-assets origin/main

          git add -f output/

          echo "[*] Staged files:"
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "[*] No new files — output identical to last run."
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          else
            git commit -m "🤖 chore: auto-generated AI dialogue & map [skip ci]"
            git push origin auto/generate-assets --force
            echo "[+] Pushed to auto/generate-assets."
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
          fi

      - name: 📬 Create Pull Request → main
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          EXISTING=$(gh pr list \
            --head auto/generate-assets \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "[*] Reusing existing open PR #$EXISTING."
            echo "PR_NUMBER=$EXISTING" >> "$GITHUB_ENV"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head auto/generate-assets \
              --title "🤖 Automated: Add generated AI assets" \
              --body "$(printf '## 🧠 Auto-generated Assets\n\n| Field | Value |\n|---|---|\n| Triggered | workflow_dispatch |\n| Pipeline | orchestrator.py (core → alien → ai → dialogue) |\n| Branch | auto/generate-assets → main |\n| Output | output/ |\n\nAuto-merged by workflow immediately after creation.')" \
              --label automated)
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
            echo "[+] Created PR #$PR_NUMBER"
            echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          fi

      - name: 🔄 Auto-merge PR into main
        if: env.HAS_CHANGES == 'true' && env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR="${{ env.PR_NUMBER }}"
          echo "[*] Merging PR #$PR into main..."

          MAX=6
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX ]; do
            echo "[*] Attempt $ATTEMPT/$MAX..."
            if gh pr merge "$PR" --merge --admin --delete-branch; then
              echo "[+] PR #$PR merged into main ✅"
              exit 0
            fi
            WAIT=$(( ATTEMPT * 8 ))
            echo "[!] Attempt $ATTEMPT failed. Retrying in ${WAIT}s..."
            sleep $WAIT
            ATTEMPT=$(( ATTEMPT + 1 ))
          done

          echo "[!] All $MAX merge attempts failed."
          exit 1

      - name: ✅ Confirm main received the changes
        if: env.HAS_CHANGES == 'true'
        run: |
          git fetch origin main
          echo "[+] main HEAD: $(git log origin/main --oneline -1)"

      - name: ⏭️ No changes — skipped
        if: env.HAS_CHANGES == 'false'
        run: echo "[*] Output identical to last run. No PR needed."
