name: 🧠 AI Dialogue Generator (Manual)

on:
  workflow_dispatch:

jobs:
  generate-and-push:
    name: 🚀 Generate Cyberpunk Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # تم إزالة سطر الكاش نهائياً

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: 🌌 Generate Alien World Map
        run: python engines/alien_generator.py

      - name: 🤖 Generate AI Dialogue (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python engines/dialogue_generator.py

      - name: 📤 Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git commit -m "🤖 chore: auto-generated AI dialogue & map [skip ci]" || echo "No changes to commit"
          git push
