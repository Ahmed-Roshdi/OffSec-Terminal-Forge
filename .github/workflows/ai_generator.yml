name: 🧠 AI Dialogue Generator (Manual)

on:
  workflow_dispatch:

jobs:
  generate-and-push:
    name: 🚀 Generate Cyberpunk Assets
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository via Deploy Key
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          ref: main

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: 🌌 Generate Alien World Map
        run: python engines/alien_generator.py

      - name: 🤖 Generate AI Dialogue (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python engines/dialogue_generator.py

      - name: 📤 Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: auto-generated AI dialogue & map [skip ci]"
          file_pattern: 'output/'
