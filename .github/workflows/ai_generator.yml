name: 🧠 AI Dialogue Generator (Manual)

on:
  workflow_dispatch:

jobs:
  generate-and-push:
    name: 🚀 Generate Cyberpunk Assets
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: 🌌 Generate Alien World Map
        run: python engines/alien_generator.py

      - name: 🤖 Generate AI Dialogue (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python engines/dialogue_generator.py

      - name: Check for changes
        id: git-check
        run: |
          # fetch remote ref (best-effort)
          git fetch origin "${{ github.ref }}" || true
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Auto Commit and Push
        if: steps.git-check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: auto-generated AI dialogue & map [skip ci]"
          file_pattern: 'output/'
