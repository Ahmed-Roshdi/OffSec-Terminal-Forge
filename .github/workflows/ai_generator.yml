name: AI Dialogue Generator

on:
  workflow_dispatch: # هذا المشغل يسمح لك بتشغيل السكريبت يدوياً من المتصفح

jobs:
  generate-dialogue:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Run Alien World Generator (Background)
        run: python engines/alien_generator.py

      - name: Run AI Dialogue Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python engines/dialogue_generator.py

      - name: Commit and Push Generated Assets
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git commit -m "chore: auto-generated AI dialogue [skip ci]" || echo "No changes to commit"
          git push
