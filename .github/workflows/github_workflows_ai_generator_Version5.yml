name: 🧠 Workflow-Output (AI Generator)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-merge:
    name: 🚀 Generate Cyberpunk Assets → Push → Merge to Main
    runs-on: ubuntu-latest
    environment: Dialogue_Generator-AI
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      # ── 4. Secrets check ───────────────────────────────────────────────────
      - name: ✅ Verify secrets are present
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          MISSING=0
          [ -z "$GROQ_API_KEY" ] && echo "[!] GROQ_API_KEY is missing." && MISSING=1
          [ -z "$GH_PAT"       ] && echo "[!] GH_PAT is missing."       && MISSING=1
          [ "$MISSING" -eq 1 ] && exit 1
          echo "[+] All secrets loaded from Dialogue_Generator-AI."

      # ── 5. Generate ────────────────────────────────────────────────────────
      - name: 🌍 Generate alien map
        run: python engines/alien_generator.py

      - name: 💬 Generate AI dialogue
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python engines/dialogue_generator.py
          echo "[+] dialogue_generator.py finished (exit $?)."

      # ── 6. Verify output ───────────────────────────────────────────────────
      - name: 🔍 Verify output files were created
        run: |
          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            echo "[!] output/ is empty — nothing to commit. Aborting."
            exit 1
          fi
          echo "[+] Output files:"
          ls -lh output/

      # ── 7. Commit & push to auto/generate-assets ──────────────────────────
      - name: 📤 Commit & push to auto/generate-assets
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "[*] Current branch: $(git branch --show-current)"
          echo "[*] Checking out auto/generate-assets from origin/main..."
          
          git fetch origin main
          git checkout -B auto/generate-assets origin/main
          
          echo "[*] Branch switched. Current status:"
          git status

          git add output/
          
          echo "[*] Staged files:"
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "[*] No changes — output is identical to last run."
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          else
            echo "[*] Changes detected. Committing..."
            git commit -m "🤖 chore: auto-generated AI dialogue & map [skip ci]"
            git push origin auto/generate-assets --force
            echo "[+] Pushed to auto/generate-assets."
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
          fi

      # ── 8. Open PR using create-pull-request action ──────────────────────
      - name: 📬 Create Pull Request → main
        id: create_pr
        if: env.HAS_CHANGES == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          base: main
          branch: auto/generate-assets
          commit-message: "🤖 chore: auto-generated AI dialogue & map"
          title: "🤖 Automated: Add generated AI assets"
          body: |
            ## 🧠 Auto-generated Assets

            | Field     | Value                         |
            |-----------|-------------------------------|
            | Triggered | workflow_dispatch             |
            | Branch    | auto/generate-assets → main   |
            | Output    | output/                       |

            Auto-merged by workflow immediately after creation.
          labels: automated
          delete-branch: false

            # ── 9. Auto-merge with retry ───────────────────────────────────────────
      - name: 🔄 Auto-merge PR into main
        if: env.HAS_CHANGES == 'true' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR="${{ steps.create_pr.outputs.pull-request-number }}"
          echo "[*] Merging PR #$PR into main..."

          MAX=6
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX ]; do
            echo "[*] Attempt $ATTEMPT/$MAX..."
            if gh pr merge "$PR" --merge --admin --delete-branch; then
              echo "[+] PR #$PR merged successfully into main. ✅"
              exit 0
            fi
            WAIT=$(( ATTEMPT * 8 ))
            echo "[!] Attempt $ATTEMPT failed. Retrying in ${WAIT}s..."
            sleep $WAIT
            ATTEMPT=$(( ATTEMPT + 1 ))
          done

          echo "[!] All $MAX merge attempts failed."
          exit 1

      # ── 10. Confirm ────────────────────────────────────────────────────────
      - name: ✅ Confirm main received the changes
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git fetch origin main
          echo "[+] main HEAD is now: $(git log origin/main --oneline -1)"

      - name: ⏭️ No changes — skipped
        if: env.HAS_CHANGES == 'false'
        run: echo "[*] Output identical to last run. No PR needed."
