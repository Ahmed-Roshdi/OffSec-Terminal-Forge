name: 🧠 Workflow-Output (AI Generator)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-merge:
    name: 🚀 Generate Cyberpunk Assets → Push → Merge to Main
    runs-on: ubuntu-latest
    environment: Dialogue_Generator-AI
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests

      # ── 4. Secrets check ───────────────────────────────────────────────────
      - name: ✅ Verify secrets are present
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          MISSING=0
          [ -z "$GROQ_API_KEY" ] && echo "[!] GROQ_API_KEY is missing." && MISSING=1
          [ -z "$GH_PAT"       ] && echo "[!] GH_PAT is missing."       && MISSING=1
          [ "$MISSING" -eq 1 ] && exit 1
          echo "[+] All secrets loaded from Dialogue_Generator-AI."

      # ── 5. Diagnose Groq API key (NON-FATAL — ai_engine has a fallback) ────
      - name: 🔑 Diagnose Groq API key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "[*] Key length : ${#GROQ_API_KEY} characters"
          echo "[*] Key prefix : ${GROQ_API_KEY:0:8}..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [[ "$GROQ_API_KEY" != gsk_* ]]; then
            echo "[!] Key does not start with 'gsk_' — WRONG FORMAT"
            echo "    → Regenerate at https://console.groq.com/keys"
            echo "GROQ_OK=false" >> "$GITHUB_ENV"
          else
            echo "[+] Format OK (starts with gsk_)"
            HTTP_STATUS=$(curl -s -o /tmp/groq_resp.json -w "%{http_code}" \
              -X POST https://api.groq.com/openai/v1/chat/completions \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"llama-3.1-8b-instant","messages":[{"role":"user","content":"Reply: OK"}],"max_tokens":3}')

            echo "[*] HTTP Status : $HTTP_STATUS"
            case "$HTTP_STATUS" in
              200) echo "[+] Groq API key VALID ✅"; echo "GROQ_OK=true" >> "$GITHUB_ENV" ;;
              401) echo "[!] 401 Unauthorized — key INVALID."; cat /tmp/groq_resp.json; echo "GROQ_OK=false" >> "$GITHUB_ENV" ;;
              403) echo "[!] 403 Forbidden — key REVOKED/quota EXCEEDED."; cat /tmp/groq_resp.json; echo "GROQ_OK=false" >> "$GITHUB_ENV" ;;
              429) echo "[!] 429 Rate limited — key is valid."; echo "GROQ_OK=false" >> "$GITHUB_ENV" ;;
              *)   echo "[!] Unexpected HTTP $HTTP_STATUS"; cat /tmp/groq_resp.json; echo "GROQ_OK=false" >> "$GITHUB_ENV" ;;
            esac
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "[*] Continuing regardless — ai_engine.py has a local fallback."

      # ── 6. Generate alien map ──────────────────────────────────────────────
      - name: 🌍 Generate alien map
        run: python engines/alien_generator.py

      # ── 7. Run AI dialogue pipeline ────────────────────────────────────────
      # orchestrator.py runs ai_engine.py then dialogue_generator.py in the
      # SAME process, so PIPELINE_RUN_TS set by orchestrator is visible to
      # both — this is what lets the render engine match the right script.
      - name: 🧠 Run AI dialogue pipeline (orchestrator)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SCENARIOS_PER_RUN: "1"
        run: python engines/orchestrator.py

      # ── 8. Verify output ───────────────────────────────────────────────────
      # Checks each output subdirectory independently — scripts, maps, and
      # dialogues — so a failure points at exactly which stage broke.
      - name: 🔍 Verify output files were created
        run: |
          echo "[*] Directory listing — output/:"
          find output/ -type f | sort
          echo ""

          MAPS=$(find output/maps      -type f 2>/dev/null | wc -l)
          SCRIPTS=$(find output/scripts -type f 2>/dev/null | wc -l)
          DIALOGUES=$(find output/dialogues -type f 2>/dev/null | wc -l)

          echo "[*] Maps      : $MAPS"
          echo "[*] Scripts   : $SCRIPTS"
          echo "[*] Dialogues : $DIALOGUES"
          echo ""

          FAIL=0
          [ "$MAPS"      -eq 0 ] && echo "[!] No map files — alien_generator.py failed." && FAIL=1
          [ "$SCRIPTS"   -eq 0 ] && echo "[!] No script files — ai_engine.py produced nothing in output/scripts/." && FAIL=1
          [ "$DIALOGUES" -eq 0 ] && echo "[!] No dialogue files — dialogue_generator.py failed to render." && FAIL=1

          if [ "$FAIL" -eq 1 ]; then
            echo "[!] Check the orchestrator logs above for the real error."
            exit 1
          fi
          echo "[+] All three output stages verified."

      # ── 9. Commit & push to auto/generate-assets ──────────────────────────
      # Explicitly stages each output subdirectory so the scripts/ folder is
      # never silently dropped, and `-f` bypasses .gitignore on output/.
      - name: 📤 Commit & push to auto/generate-assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B auto/generate-assets origin/main

          for dir in output/maps output/scripts output/dialogues; do
            if [ -d "$dir" ]; then
              git add -f "$dir"
              echo "[+] Staged: $dir"
            else
              echo "[!] Skipped (not found): $dir"
            fi
          done

          echo "[*] Staged files:"
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "[*] No new files — output identical to last run."
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          else
            git commit -m "🤖 chore: auto-generated map, script & dialogue [skip ci]"
            git push origin auto/generate-assets --force
            echo "[+] Pushed to auto/generate-assets."
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
          fi

      # ── 10. Open PR via gh CLI ─────────────────────────────────────────────
      - name: 📬 Create Pull Request → main
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          EXISTING=$(gh pr list \
            --head auto/generate-assets \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "[*] Reusing existing open PR #$EXISTING."
            echo "PR_NUMBER=$EXISTING" >> "$GITHUB_ENV"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head auto/generate-assets \
              --title "🤖 Automated: Add generated AI assets" \
              --body "$(printf '## 🧠 Auto-generated Assets\n\n| Field | Value |\n|---|---|\n| Triggered | workflow_dispatch |\n| Groq API | %s |\n| Branch | auto/generate-assets → main |\n| Output | output/maps, output/scripts, output/dialogues |\n\nAuto-merged by workflow.' "${{ env.GROQ_OK }}")" \
              --label automated)
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
            echo "[+] Created PR #$PR_NUMBER"
            echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          fi

      # ── 11. Auto-merge with retry ──────────────────────────────────────────
      - name: 🔄 Auto-merge PR into main
        if: env.HAS_CHANGES == 'true' && env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR="${{ env.PR_NUMBER }}"
          MAX=6
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX ]; do
            echo "[*] Merge attempt $ATTEMPT/$MAX for PR #$PR..."
            if gh pr merge "$PR" --merge --admin --delete-branch; then
              echo "[+] PR #$PR merged into main ✅"
              exit 0
            fi
            WAIT=$(( ATTEMPT * 8 ))
            echo "[!] Attempt $ATTEMPT failed. Retrying in ${WAIT}s..."
            sleep $WAIT
            ATTEMPT=$(( ATTEMPT + 1 ))
          done
          echo "[!] All $MAX merge attempts failed."
          exit 1

      # ── 12. Confirm ────────────────────────────────────────────────────────
      - name: ✅ Confirm main received the changes
        if: env.HAS_CHANGES == 'true'
        run: |
          git fetch origin main
          echo "[+] main HEAD: $(git log origin/main --oneline -1)"

      - name: ⏭️ No changes — skipped
        if: env.HAS_CHANGES == 'false'
        run: echo "[*] Output identical to last run. No PR needed."