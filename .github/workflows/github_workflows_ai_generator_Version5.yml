name: 🧠 Workflow-Output (AI Generator)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-merge:
    name: 🚀 Generate Cyberpunk Assets → Push → Merge to Main
    runs-on: ubuntu-latest
    environment: Dialogue_Generator-AI
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}   # PAT so push + merge can bypass branch rules

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      # ── 4. Secrets check (safe — never interpolates secrets into shell) ───
      - name: ✅ Verify secrets are present
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          MISSING=0
          [ -z "$GROQ_API_KEY" ] && echo "[!] GROQ_API_KEY is missing." && MISSING=1
          [ -z "$GH_PAT"       ] && echo "[!] GH_PAT is missing."       && MISSING=1
          [ "$MISSING" -eq 1 ] && exit 1
          echo "[+] All secrets loaded from Dialogue_Generator-AI."

      # ── 5. Generate assets ─────────────────────────────────────────────────
      - name: 🌍 Generate alien map
        run: python engines/alien_generator.py

      - name: 💬 Generate AI dialogue
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python engines/dialogue_generator.py
          echo "[+] dialogue_generator.py finished (exit $?)."

      # ── 6. Verify output ───────────────────────────────────────────────────
      - name: 🔍 Verify output files were created
        run: |
          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            echo "[!] output/ is empty — nothing to commit. Aborting."
            exit 1
          fi
          echo "[+] Output files:"
          ls -lh output/

      # ── 7. Push output to auto/generate-assets ────────────────────────────
      - name: 📤 Commit & push to auto/generate-assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or reset the feature branch from current HEAD
          git checkout -B auto/generate-assets

          git add output/
          
          # Only commit if there is actually something new
          if git diff --cached --quiet; then
            echo "[*] No changes to commit — output matches last run."
            echo "SKIP_MERGE=true" >> "$GITHUB_ENV"
          else
            git commit -m "🤖 chore: auto-generated AI dialogue & map [skip ci]"
            git push origin auto/generate-assets --force
            echo "[+] Pushed to auto/generate-assets."
            echo "SKIP_MERGE=false" >> "$GITHUB_ENV"
          fi

      # ── 8. Open PR (auto/generate-assets → main) ──────────────────────────
      - name: 📬 Create Pull Request → main
        id: cpr
        if: env.SKIP_MERGE == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          base: main                          # ← merge TARGET
          branch: auto/generate-assets        # ← merge SOURCE
          commit-message: "🤖 chore: auto-generated AI dialogue & map"
          title: "🤖 Automated: Add generated AI assets"
          body: |
            ## 🧠 Auto-generated Assets

            | Field       | Value                        |
            |-------------|------------------------------|
            | Triggered   | `workflow_dispatch`          |
            | Branch      | `auto/generate-assets → main`|
            | Output dir  | `output/`                    |

            Auto-merged by the workflow immediately after creation.
          labels: automated
          delete-branch: false   # keep the branch; we delete it after merge below

      # ── 9. Auto-merge with retry ───────────────────────────────────────────
      - name: 🔄 Auto-merge PR into main (with retry)
        if: env.SKIP_MERGE == 'false' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR="${{ steps.cpr.outputs.pull-request-number }}"
          echo "[*] Merging PR #$PR into main..."

          MAX=6
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX ]; do
            echo "[*] Attempt $ATTEMPT/$MAX..."
            if gh pr merge "$PR" --merge --admin --delete-branch; then
              echo "[+] PR #$PR merged successfully into main."
              exit 0
            fi
            WAIT=$(( ATTEMPT * 8 ))
            echo "[!] Attempt $ATTEMPT failed. Waiting ${WAIT}s before retry..."
            sleep $WAIT
            ATTEMPT=$(( ATTEMPT + 1 ))
          done

          echo "[!] All $MAX merge attempts failed. Check branch protection rules."
          exit 1

      # ── 10. Confirm main is up to date ────────────────────────────────────
      - name: ✅ Confirm main branch received the changes
        if: env.SKIP_MERGE == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git fetch origin main
          LATEST=$(git log origin/main --oneline -1)
          echo "[+] main HEAD is now: $LATEST"

      # ── 11. Nothing-to-do notice ───────────────────────────────────────────
      - name: ⏭️ No changes detected — skipped merge
        if: env.SKIP_MERGE == 'true'
        run: echo "[*] Output identical to last run. No PR or merge needed."
