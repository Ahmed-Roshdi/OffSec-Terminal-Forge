name: 🧠 Workflow-Output (AI Generator)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-merge:
    name: 🚀 Generate Cyberpunk Assets → Push → Merge to Main
    runs-on: ubuntu-latest
    environment: Dialogue_Generator-AI
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests

      # ── 4. Secrets check ───────────────────────────────────────────────────
      - name: ✅ Verify secrets are present
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          MISSING=0
          [ -z "$GROQ_API_KEY" ] && echo "[!] GROQ_API_KEY is missing." && MISSING=1
          [ -z "$GH_PAT"       ] && echo "[!] GH_PAT is missing."       && MISSING=1
          [ "$MISSING" -eq 1 ] && exit 1
          echo "[+] All secrets loaded successfully."

      # ── 5. Generate ────────────────────────────────────────────────────────
      - name: 🌍 Generate alien map
        run: python engines/alien_generator.py

      - name: 🧠 Generate AI dialogue JSON (ai_engine)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python engines/ai_engine.py --request "Generate a cyberpunk security dialogue for Manus (5-8 lines)."

      - name: 💬 Render AI dialogue into WebP (dialogue_generator)
        run: python engines/dialogue_generator.py

      # ── 6. Verify output ───────────────────────────────────────────────────
      - name: 🔍 Verify output files were created
        run: |
          echo "[*] Files found in output/:"
          find output/ -type f | head -20
          COUNT=$(find output/ -type f | wc -l)
          echo "[*] Total: $COUNT files"
          if [ "$COUNT" -eq 0 ]; then
            echo "[!] output/ is empty — nothing to commit. Aborting."
            exit 1
          fi

      # ── 7. Commit & push to auto/generate-assets ──────────────────────────
      - name: 📤 Commit & push to auto/generate-assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main

          # Isolate generated output to a safe temp location
          TMP_OUT="/tmp/output-$$"
          if [ -d output ]; then
            echo "[*] Moving output/ -> $TMP_OUT"
            mv output "$TMP_OUT"
          fi

          # Create branch from a clean state (origin/main)
          git checkout -B auto/generate-assets origin/main

          # Restore generated output
          if [ -d "$TMP_OUT" ]; then
            echo "[*] Restoring generated output"
            mv "$TMP_OUT" output
          fi

          # Force-add files bypassing local .gitignore
          git add -f output/

          echo "[*] Staged files:"
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "[*] No new files — output identical to last run."
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          else
            git commit -m "🤖 chore: auto-generated AI dialogue & map [skip ci]"
            git push origin auto/generate-assets --force
            echo "[+] Pushed to auto/generate-assets."
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
          fi

      # ── 8. Authenticate gh CLI ─────────────────────────────────────────────
      - name: 🔐 Authenticate gh CLI
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh auth status || echo "$GH_TOKEN" | gh auth login --with-token
          gh --version

      # ── 9. Open PR via gh CLI ──────────────────────────────────────────────
      - name: 📬 Create Pull Request → main
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          EXISTING=$(gh pr list \
            --head auto/generate-assets \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "[*] Reusing existing open PR #$EXISTING."
            echo "PR_NUMBER=$EXISTING" >> "$GITHUB_ENV"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head auto/generate-assets \
              --title "🤖 Automated: Add generated AI assets" \
              --body "## 🧠 Auto-generated Assets\n\n| Field | Value |\n|---|---|\n| Triggered | workflow_dispatch |\n| Branch | auto/generate-assets → main |\n| Output | output/ |" \
              --label automated)
            
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$' || true)
            if [ -n "$PR_NUMBER" ]; then
              echo "[+] Created PR #$PR_NUMBER"
              echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
            else
              echo "[!] Failed to parse PR number from URL: $PR_URL"
              echo "PR_NUMBER=" >> "$GITHUB_ENV"
            fi
          fi

      # ── 10. Auto-merge with retry ──────────────────────────────────────────
      - name: 🔄 Auto-merge PR into main
        if: env.HAS_CHANGES == 'true' && env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR="${{ env.PR_NUMBER }}"
          echo "[*] Merging PR #$PR into main..."

          MAX=6
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX ]; do
            echo "[*] Attempt $ATTEMPT/$MAX..."
            if gh pr merge "$PR" --merge --admin --delete-branch; then
              echo "[+] PR #$PR merged into main ✅"
              exit 0
            fi
            WAIT=$(( ATTEMPT * 8 ))
            echo "[!] Attempt $ATTEMPT failed. Retrying in ${WAIT}s..."
            sleep $WAIT
            ATTEMPT=$(( ATTEMPT + 1 ))
          done

          echo "[!] All $MAX merge attempts failed."
          exit 1

      # ── 11. Confirm ────────────────────────────────────────────────────────
      - name: ✅ Confirm main received the changes
        if: env.HAS_CHANGES == 'true'
        run: |
          git fetch origin main
          echo "[+] main HEAD: $(git log origin/main --oneline -1)"

      - name: ⏭️ No changes — skipped
        if: env.HAS_CHANGES == 'false'
        run: echo "[*] Output identical to last run. No PR needed."
