name: 🧠 AI Dialogue Generator (Auto PR)

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Open PR as draft?'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-open-pr:
    name: 🚀 Generate Cyberpunk Assets and Open PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install Pillow
          fi

      - name: ✅ Check required secrets
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "ERROR: GROQ_API_KEY is not set. Add it to repository secrets."
            exit 1
          fi

      - name: 🌌 Generate assets (map + dialogue)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python engines/alien_generator.py
          python engines/dialogue_generator.py || echo "dialogue generator failed, using fallback"

      - name: 📤 Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "🤖 chore: auto-generated AI dialogue & map"
          branch: auto/generate-assets
          delete-branch: true
          title: "Automated: Add generated AI assets"
          body: |
            This PR adds auto-generated assets created by the AI generator workflow.
            - Generated files live under `output/`
            - Auto-merged via GitHub CLI.
          labels: automated
          draft: false

      - name: 🔄 Auto-merge Pull Request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "[*] Attempting to auto-merge PR #${{ steps.cpr.outputs.pull-request-number }}"
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --delete-branch
