name: 🧠 AI Dialogue Generator (Auto PR)

# Manual trigger for now; keep workflow_dispatch so you control execution.
# Optional: enable scheduled runs by uncommenting the schedule block or add inputs.
on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Open PR as draft?'
        required: false
        default: 'true'
  # schedule:
  #   - cron: '0 2 * * *'  # daily at 02:00 UTC (example)

# Allow this workflow to create branches & PRs (keep minimal)
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-open-pr:
    name: 🚀 Generate Cyberpunk Assets and Open PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            # Fallback for this repo
            pip install Pillow
          fi

      - name: ✅ Check required secrets
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "ERROR: GROQ_API_KEY is not set. Add it to repository secrets."
            exit 1
          fi

      - name: 🌌 Generate assets (map + dialogue)
        env:
          GROQ_API_KEY: $
