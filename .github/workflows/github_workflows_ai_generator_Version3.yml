name: 🧠 AI Dialogue Generator (Auto PR)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-open-pr:
    name: 🚀 Generate Cyberpunk Assets and Open PR
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: 🌌 Generate assets (map + dialogue)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          python engines/alien_generator.py
          # dialogue generator may fail against API; allow fallback handling within script
          python engines/dialogue_generator.py || echo "dialogue generator failed, using fallback"

      - name: Configure git user for CI commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: git-check
        run: |
          # show status for debugging
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch, commit & push (only if changed)
        id: create_branch
        if: steps.git-check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          BRANCH="auto/generate-${{ github.run_number }}-${{ github.run_id }}"

          # create branch from default branch to ensure consistent base
          git fetch origin "$DEFAULT_BRANCH" --depth=1
          git checkout -b "$BRANCH" "origin/$DEFAULT_BRANCH"

          # add only the output directory
          git add output/ || true
          if git diff --cached --quiet; then
            echo "No staged changes to commit"; exit 0
          fi

          git commit -m "chore: auto-generated AI dialogue & map [skip ci]"

          # push branch with force-with-lease to handle existing branches safely
          git push --set-upstream origin "$BRANCH" --force-with-lease || (sleep 2 && git push --set-upstream origin "$BRANCH" --force-with-lease)

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.create_branch.outputs.branch }}
          base: ${{ github.event.repository.default_branch }}
          title: "Automated: Add generated AI assets"
          body: |
            This PR adds auto-generated assets created by the AI generator workflow.

            - Generated files live under `output/`
            - Please review before merging.
          labels: automated
