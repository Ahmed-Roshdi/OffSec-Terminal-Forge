name: 🧠 Workflow-Output (AI Generator)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-open-pr:
    name: 🚀 Generate Cyberpunk Assets and Open PR
    runs-on: ubuntu-latest
    environment: Dialogue_Generator-AI  # <-- ربط البيئة التي تحتوي على الأسرار
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: ✅ Check required secrets
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "[!] ERROR: GROQ_API_KEY is missing from the environment."
            exit 1
          fi
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "[!] ERROR: GH_PAT is missing from the environment."
            exit 1
          fi
          echo "[+] All secrets loaded successfully from Dialogue_Generator-AI environment."

      - name: 🌌 Generate assets (map + dialogue)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python engines/alien_generator.py
          
          echo "[*] Waiting 2 seconds before starting dialogue generator..."
          sleep 2
          
          python engines/dialogue_generator.py || echo "dialogue generator failed, using fallback"

      - name: 📤 Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "🤖 chore: auto-generated AI dialogue & map"
          branch: auto/generate-assets
          delete-branch: true
          title: "Automated: Add generated AI assets"
          body: |
            This PR adds auto-generated assets created by the AI generator workflow.
            - Generated files live under `output/`
            - Auto-merged via GitHub CLI.
          labels: automated
          draft: false

      - name: 🔄 Auto-merge Pull Request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "[*] Waiting 5 seconds for GitHub API to process PR mergeability..."
          sleep 5
          echo "[*] Attempting to auto-merge PR #${{ steps.cpr.outputs.pull-request-number }} with Admin privileges"
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --admin --delete-branch
