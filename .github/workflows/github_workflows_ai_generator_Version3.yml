name: 🧠 AI Dialogue Generator (Auto PR)

# Manual trigger for now; keep workflow_dispatch so you control execution.
on:
  workflow_dispatch:

# Allow this workflow to create branches & PRs
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-open-pr:
    name: 🚀 Generate Cyberpunk Assets and Open PR
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: 🌌 Generate assets (map + dialogue)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -e
          python engines/alien_generator.py
          python engines/dialogue_generator.py || echo "dialogue generator failed, using fallback"

      - name: Configure git user (for commits)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: git-check
        run: |
          # show status for debugging
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch, commit & push (only if changed)
        id: create_branch
        if: steps.git-check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Generate a guaranteed-unique branch name per run attempt
          BRANCH="auto/generate-${{ github.run_number }}-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "Creating branch: $BRANCH"
          git fetch origin
          git checkout -b "$BRANCH"
          git add output/ || true
          git commit -m "chore: auto-generated AI dialogue & map [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push --set-upstream origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.create_branch.outputs.branch }}
          title: "Automated: Add generated AI assets"
          body: |
            This PR adds auto-generated assets created by the scheduled/manual AI generator workflow.
            - Generated files live under `output/`
            - Please review before merging.
          labels: automated
