name: 🧠 Workflow-Output (AI Generator)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-generator
  cancel-in-progress: true

jobs:
  generate-and-open-pr:
    name: 🚀 Generate Assets & Open PR
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: 🌌 Generate assets (map + dialogue)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python engines/alien_generator.py
          
          echo "[*] Waiting 2 seconds before starting dialogue generator..."
          sleep 2
          
          python engines/dialogue_generator.py || echo "dialogue generator failed, using fallback"

      - name: ⏳ I/O Buffer Wait & Verify
        run: |
          echo "[*] Waiting 5 seconds for OS I/O operations to flush..."
          sleep 5
          echo "[*] Verifying output directory contents:"
          ls -la output/maps/ || echo "Maps directory not found!"
          ls -la output/dialogues/ || echo "Dialogues directory not found!"

          - name: 📤 Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "🤖 chore: auto-generated AI dialogue & map"
          branch: auto/generate-assets
          delete-branch: true
          title: "Automated: Add generated AI assets"
          body: |
            This PR adds auto-generated assets created by the AI generator workflow.
            - Generated files live under `output/`
            - Auto-merged via GitHub CLI.
          labels: automated

      - name: 🔄 Auto-merge Pull Request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "[*] Attempting to auto-merge PR #${{ steps.cpr.outputs.pull-request-number }}"
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --delete-branch
